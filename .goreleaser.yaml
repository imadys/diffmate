version: 2

project_name: diffmate

builds:
  - id: diffmate
    main: ./cmd/diffmate
    binary: diffmate
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w -X github.com/imadys/diffmate/internal/version.Version={{ .Version }}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: diffmate
    ids:
      - diffmate
    name_template: "diffmate-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: imadys
    name: diffmate
